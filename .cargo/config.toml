# Required by @vercel/rust 1.3.0 builder — an empty [build] table is mandatory.
# The builder reads .cargo/config.toml and accesses cargoBuildConfiguration?.build.target
# which crashes if [build] table is missing.
[build]

[target.x86_64-unknown-linux-gnu]
linker = "zig cc -target x86_64-unknown-linux-gnu"
